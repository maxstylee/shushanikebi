<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="../styles/style.css" />
  <title>SHUSHANIKI</title>
</head>

<body>
  <div class="content-wrapper">
    <aside class="aside-wrapper">
      <nav>
        <ul>
          <li class="aside-library">
            <a href="">
              <img src="../asset/icons/Library.svg" alt="Library" />
              My Library
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Pins.svg" alt="Pins" />
              Pins
              <img class="pinned-music" src="../asset/icons/right-arrow.svg" />
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Playlist.svg" alt="Playlist" />
              Playlist
              <img class="pinned-music" src="../asset/icons/right-arrow.svg" />
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Liked songs.svg" alt="Liked songs" />
              Liked songs
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Saves.svg" alt="Saves" />
              Saves
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Albums.svg" alt="Albums" />
              Albums
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Folders.svg" alt="Folders" />
              Folders
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Podcasts.svg" alt="Podcasts" />
              Podcasts
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Audiobooks.svg" alt="Audiobooks" />
              Audiobooks
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Artists.svg" alt="Artists" />
              Artists
            </a>
          </li>
        </ul>
      </nav>
    </aside>
    <header class="header-section">
      <nav>
        <ul>
          <li class="header-home">
            <a href="">
              <img src="../asset/icons/Home-active.svg" alt="Home" />
              Home
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Discover.svg" alt="Discover" />
              Discover
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Search.svg" alt="Search" />
              Search
            </a>
          </li>
        </ul>

        <!-- header navigation on left -->
        <ul>
          <li>
            <a href="">
              <img src="../asset/icons/Notification.svg" alt="Notification" />
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/block.svg" alt="block" />
            </a>
          </li>
          <li id="friends">
            <a href="#">
              <img src="../asset/icons/Groups.svg" alt="Groups" />
              <img src="../asset/icons/Groups-active.svg" alt="Friend List" class="friend-list-active" />
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Settings.svg" alt="Settings" />
            </a>
          </li>
          <li>
            <a href="">
              <img src="../asset/icons/Sprite.svg" alt="Sprite" />
            </a>
          </li>
        </ul>
      </nav>
    </header>


    <main class="main-container">
      <section class="main-content">

            <!-- recent searches -->
            <section class="search-page">

                    <div class="search-page__section-header">
                        <h2 class="search-page__section-title">Recent searches</h2>

                        <button class="icon-btn">
                            <img src="../asset/icons/threedots.svg" alt="More">
                        </button>
                    </div>

                    <div class="search-page__recent-list">
                        <div class="recent-card">

                            <div class="recent-card__image">
                                <img src="../asset/images/daft punk pn.png" alt="music image">
                                <button class="recent-card__remove">×</button>
                            </div>
                            <h3 class="recent-card__title">Daft Punk</h3>

                        </div>

                        <div class="recent-card">

                            <div class="recent-card__image">
                                <img src="../asset/images/david bowie.png" alt="music image">
                                <button class="recent-card__remove">×</button>
                            </div>
                            <h3 class="recent-card__title">David Bowie</h3>

                        </div>

                        <div class="recent-card recent-card--square">

                            <div class="recent-card__image">
                                <img src="../asset/images/black holes.png" alt="music image">
                                <button class="recent-card__remove">×</button>
                            </div>
                            <h3 class="recent-card__title">Black Holes...</h3>
                            <p class="recent-card__subtitle">Muse</p>

                        </div>
                    </div>

            </section>



        <!-- <div id="music-container"></div>  --> <!-- ეს კონტეინერი აგენერირებს ქარდებს -->
      
    
    
      </section>

      <section class="friend-list">
        <ul>
          <li></li>
          <li></li>
          <li></li>
          <li></li>
        </ul>
      </section>
    </main>


    <footer></footer>
  </div>
  <script src="../script.js"></script>
  <script src="../data.js"></script>
</body>

</html>
